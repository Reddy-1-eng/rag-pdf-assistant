services:
  - type: web
    name: rag-pdf-assistant
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: 10000
    disk:
      name: rag-storage
      mountPath: /opt/render/project/src/vector_db
      sizeGB: 1