<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG PDF Assistant</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 RAG PDF Assistant</h1>
            <p>Ask questions about your uploaded documents</p>
        </header>

        <div class="chat-container">
            <div id="chat-messages" class="chat-messages">
                <div class="message bot-message">
                    <div class="message-content">
                        <strong>Assistant:</strong> Hello! I'm ready to answer questions about your PDF documents. What would you like to know?
                    </div>
                </div>
            </div>

            <div class="input-container">
                <input type="text" id="question-input" placeholder="Ask a question about your documents..." />
                <button id="send-button">Send</button>
            </div>
        </div>

        <div class="status" id="status">
            Ready to answer questions
        </div>
    </div>

    <script src="static/script.js"></script>
</body>
</html>
